services:
  - type: web
    name: odos-admin
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://odos-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
